<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="style.css" rel="stylesheet"></link>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>
    <div class="container py-4">
        <div class="title-frame mb-3">
            <div class="title-frame-inner">
                <h1 class="mb-0 text-center">Pokémon</h1>
            </div>
        </div>

        <div class="card filters-card mb-3">
            <div class="card-body">
                <div class="row g-2 align-items-end">
                    <div class="col-12 col-md-4">
                        <label for="filter-name" class="form-label mb-1">Nombre</label>
                        <input id="filter-name" class="form-control" type="text" placeholder="Ej: ditto" />
                    </div>
                    <div class="col-12 col-md-3">
                        <label for="filter-type" class="form-label mb-1">Tipo</label>
                        <select id="filter-type" class="form-select">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-3">
                        <label for="filter-ability" class="form-label mb-1">Habilidad</label>
                        <input id="filter-ability" class="form-control" type="text" placeholder="Ej: limber" />
                    </div>
                    <div class="col-12 col-md-2">
                        <label for="filter-evolution" class="form-label mb-1">Evolución</label>
                        <select id="filter-evolution" class="form-select">
                            <option value="">Todas</option>
                            <option value="has">Con evolución</option>
                            <option value="none">Sin evolución</option>
                            <option value="final">Última evolución</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div id="pokemon-list" class="row">Cargando...</div>
    </div>


    <script src="main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>

</html>
